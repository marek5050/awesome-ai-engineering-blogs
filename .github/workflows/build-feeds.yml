name: Build RSS feeds

on:
  schedule:
    # Once a day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/build-feeds.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Build Anthropic Research feed
        run: python scripts/build_anthropic_research_feed.py

      - name: Build Meta AI feed
        run: python scripts/build_meta_ai_feed.py

      - name: Commit updated feeds
        run: |
          if [[ -z "$(git status --porcelain feeds/)" ]]; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git commit -m "chore: refresh feeds"
          git push
